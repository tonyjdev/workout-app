<!doctype html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StriveFit</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="./styles.css?v=1.2" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark border-bottom sticky-top">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold">StriveFit</span>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-light btn-sm" data-action="open-catalog" title="Catálogo de ejercicios">
          <i class="bi bi-list-ul"></i>
        </button>
        <button class="btn btn-outline-light btn-sm" data-bs-toggle="offcanvas" data-bs-target="#appHelp" aria-controls="appHelp" title="Ayuda contextual">
          <i class="bi bi-question-circle"></i>
        </button>
      </div>
    </div>
  </nav>

  <main id="appContent" class="container py-3" style="margin-bottom: 100px !important;"></main>

  <nav id="bottomBar" class="navbar bg-body-tertiary border-top fixed-bottom">
    <div class="container px-0">
      <div class="nav w-100 justify-content-around" id="bottomNav">
        <button type="button" class="nav-link active" data-view="home">
          <i class="bi bi-house"></i><span>Start</span>
        </button>
        <button type="button" class="nav-link" data-view="training">
          <i class="bi bi-lightning-charge"></i><span>Train</span>
        </button>
        <button type="button" class="nav-link" data-view="progress">
          <i class="bi bi-graph-up"></i><span>Report</span>
        </button>
        <button type="button" class="nav-link" data-view="settings">
          <i class="bi bi-gear"></i><span>Settings</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Offcanvas (help & catalog) -->
  <div class="offcanvas offcanvas-end" tabindex="-1" id="appHelp" aria-labelledby="appHelpLabel">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="appHelpLabel">Ayuda</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body" id="helpContent">
      <p class="text-secondary mb-0">Información contextual.</p>
    </div>
  </div>

  <!-- Modal: Add Plan -->
  <div class="modal fade" id="addPlanModal" tabindex="-1" aria-labelledby="addPlanLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="addPlanLabel">Añadir entrenamiento</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <p class="text-secondary small">Selecciona un archivo <code>.json</code> con el plan. Se guardará para usarlo más tarde.</p>
          <div class="input-group">
            <input class="form-control" type="file" id="planFileInput" accept="application/json">
            <button class="btn btn-primary" data-action="upload-plan"><i class="bi bi-upload me-1"></i> Cargar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <canvas id="confettiCanvas"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./app.js?v=2.0"></script>
</body>
</html>
