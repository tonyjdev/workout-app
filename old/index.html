<!doctype html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StriveFit</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="./styles.css" rel="stylesheet">
</head>
<body>
  <!-- Top bar -->
  <nav class="navbar navbar-dark bg-dark border-bottom sticky-top">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold">StriveFit</span>
      <button class="btn btn-outline-light btn-sm" data-bs-toggle="offcanvas" data-bs-target="#appHelp" aria-controls="appHelp">
        <i class="bi bi-question-circle"></i>
      </button>
    </div>
  </nav>

  <!-- Main content -->
  <main id="appContent" class="container py-3">
    <!-- Contenido dinámico renderizado por app.js -->
  </main>

  <!-- Bottom nav -->
  <nav class="navbar bg-body-tertiary border-top fixed-bottom">
    <div class="container px-0">
      <div class="nav nav-underline w-100 justify-content-around" id="bottomNav">
        <button class="nav-link active" data-view="home"><i class="bi bi-house"></i><br><small>Inicio</small></button>
        <button class="nav-link" data-view="training"><i class="bi bi-lightning-charge"></i><br><small>Entrenamiento</small></button>
        <button class="nav-link" data-view="progress"><i class="bi bi-graph-up"></i><br><small>Progreso</small></button>
        <button class="nav-link" data-view="settings"><i class="bi bi-gear"></i><br><small>Config</small></button>
      </div>
    </div>
  </nav>

  <!-- Offcanvas de ayuda / info contextual -->
  <div class="offcanvas offcanvas-end" tabindex="-1" id="appHelp" aria-labelledby="appHelpLabel">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="appHelpLabel">Ayuda</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body" id="helpContent">
      <p>Información contextual de la pantalla o del ejercicio.</p>
    </div>
  </div>

  <!-- Confetti -->
  <canvas id="confettiCanvas"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
